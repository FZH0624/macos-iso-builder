name: 上传 Artifacts 到百度网盘

on:
  workflow_run:
    workflows: ["macos-iso-builder"]
    types: [completed]
  workflow_dispatch:

jobs:
  upload-to-baidu:
    runs-on: ubuntu-latest
    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          run-id: 22527133827
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: 安装 baidupcs-go（修复软链接冲突）
        run: |
          # 下载固定版本包（避免latest链接失效）
          wget -q https://github.com/felixonmars/baidupcs-go/releases/download/v3.9.2/baidupcs-go-linux-amd64.zip -O baidupcs-go.zip
          
          # 解压并列出文件（排查文件名）
          unzip -oq baidupcs-go.zip
          echo "解压后的文件列表："
          ls -l  # 打印文件列表，方便排查
          
          # 给所有baidupcs-go开头的文件赋执行权限（兼容任意文件名）
          chmod +x baidupcs-go*
          
          # 关键修复：先删除已存在的软链接/文件，避免冲突
          rm -f baidupcs-go
          # 软链接为固定名称，后续命令统一用这个名称
          ln -s $(ls baidupcs-go* | grep -v .zip) baidupcs-go

      - name: 上传到百度网盘
        env:
          BDUSS: ${{ secrets.BDUSS }}
        run: |
          # 用软链接的固定名称运行，无需关心原文件名
          ./baidupcs-go login -bduss="${BDUSS}"
          ./baidupcs-go mkdir -p /github-artifacts/macos-iso
          ./baidupcs-go upload -r ./* /github-artifacts/macos-iso/
          echo "✅ 文件已成功上传到百度网盘：/github-artifacts/macos-iso/"
