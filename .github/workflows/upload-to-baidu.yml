name: 上传 Artifacts 到百度网盘

on:
  workflow_run:
    workflows: ["macos-iso-builder"]
    types: [completed]
  workflow_dispatch:  # 手动触发开关

jobs:
  upload-to-baidu:
    runs-on: ubuntu-latest
    steps:
      # 步骤1：下载指定 run 的 Artifacts（GitHub 内网传输，100% 成功）
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          run-id: 22527133827
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # 步骤2：安装 rclone（系统内置，无下载失败问题）
      - name: 安装 rclone 工具
        run: |
          sudo apt update -y
          sudo apt install -y rclone
          # 验证安装是否成功
          rclone version

      # 步骤3：配置百度网盘并上传文件（核心！）
      - name: 上传到百度网盘
        env:
          BDUSS: ${{ secrets.BDUSS }}  # 用你之前配置的密钥
        run: |
          # 生成 rclone 配置文件
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
          [baidu]
          type = baidu
          bduss = ${BDUSS}
          EOF

          # 创建网盘目录（不存在则创建，存在则跳过）
          rclone mkdir baidu:/github-artifacts/macos-iso || true

          # 上传文件到百度网盘（显示进度，覆盖已有文件）
          rclone copy ./* baidu:/github-artifacts/macos-iso/ --progress --overwrite

          # 上传成功提示
          echo -e "\n✅ 上传完成！"
          echo "📂 文件路径：百度网盘 → github-artifacts → macos-iso"
          echo "💡 国内直接打开百度网盘即可满速下载"
